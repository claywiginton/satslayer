<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#1a1a1f"/>
      <stop offset="100%" stop-color="#08080a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f7931a" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#f7931a" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#f7931a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ironBody" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#6a6a6a"/>
      <stop offset="50%" stop-color="#4a4a4a"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </radialGradient>
    <radialGradient id="ironHandle" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#5a5a5a"/>
      <stop offset="100%" stop-color="#333333"/>
    </radialGradient>
    <radialGradient id="btcGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f7931a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f7931a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="btcStamp" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb84d"/>
      <stop offset="50%" stop-color="#f7931a"/>
      <stop offset="100%" stop-color="#d4780a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="innerGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- Subtle orange glow behind kettlebell -->
  <ellipse cx="512" cy="580" rx="280" ry="280" fill="url(#glow)"/>

  <!-- Kettlebell group -->
  <g filter="url(#shadow)">
    <!-- Handle -->
    <path d="M380,420 C380,280 420,220 512,220 C604,220 644,280 644,420" 
          fill="none" stroke="url(#ironHandle)" stroke-width="52" stroke-linecap="round"/>
    
    <!-- Handle inner cutout (background color) -->
    <path d="M410,420 C410,305 440,255 512,255 C584,255 614,305 614,420" 
          fill="#0d0d10" stroke="none"/>
    
    <!-- Handle highlight -->
    <path d="M395,410 C395,290 430,235 512,235 C530,235 545,238 558,244" 
          fill="none" stroke="#777" stroke-width="3" stroke-linecap="round" opacity="0.3"/>

    <!-- Body -->
    <ellipse cx="512" cy="580" rx="220" ry="230" fill="url(#ironBody)"/>
    
    <!-- Body highlight (upper left) -->
    <ellipse cx="450" cy="510" rx="90" ry="100" fill="#6a6a6a" opacity="0.25"/>
    
    <!-- Body edge highlight -->
    <ellipse cx="420" cy="490" rx="50" ry="70" fill="#888" opacity="0.1"/>
    
    <!-- Flat bottom -->
    <rect x="370" y="780" width="284" height="24" rx="12" fill="#222"/>
    <rect x="380" y="780" width="264" height="12" rx="6" fill="#3a3a3a"/>
  </g>

  <!-- Bitcoin stamp glow -->
  <ellipse cx="512" cy="570" rx="120" ry="120" fill="url(#btcGlow)"/>
  
  <!-- Bitcoin stamp circle -->
  <circle cx="512" cy="570" r="105" fill="none" stroke="url(#btcStamp)" stroke-width="4" opacity="0.8"/>
  <circle cx="512" cy="570" r="95" fill="none" stroke="url(#btcStamp)" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Bitcoin ₿ symbol -->
  <text x="512" y="572" text-anchor="middle" dominant-baseline="central" 
        font-family="Arial, Helvetica, sans-serif" font-size="140" font-weight="700" 
        fill="url(#btcStamp)">₿</text>
  
  <!-- Subtle shine on top of ₿ -->
  <text x="512" y="570" text-anchor="middle" dominant-baseline="central" 
        font-family="Arial, Helvetica, sans-serif" font-size="140" font-weight="700" 
        fill="#ffcc66" opacity="0.15">₿</text>
</svg>
